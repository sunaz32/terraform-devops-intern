name: Terraform CI/CD

on:
  push:
    branches:
      - dev
      - stage
      - main  # for prod
    paths:
      - 'dev-environment/**'
      - 'stage-environment/**'
      - 'prod-environment/**'
      - '.github/workflows/terraform.yml'

  workflow_dispatch:
    inputs:
      image_url:
        description: 'Docker image URL (ECR full path with tag)'
        required: true
        type: string
      env_name:
        description: 'Environment name (dev, stage, prod)'
        required: true
        type: string
      destroy:
        description: 'Set true to destroy resources'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform CI/CD
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.6

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::851725602228:role/Githubterraform-newrole
          role-session-name: terraform-session
          aws-region: ${{ env.AWS_REGION }}

      - name: Set Environment Variables
        id: setvars
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BRANCH="${{ github.ref_name }}"
            if [[ "$BRANCH" == "main" ]]; then
              echo "env_name=prod" >> $GITHUB_OUTPUT
            else
              echo "env_name=$BRANCH" >> $GITHUB_OUTPUT
            fi
            echo "env_folder=${BRANCH}-environment" >> $GITHUB_OUTPUT
            echo "image_url=amazon/amazon-ecs-sample" >> $GITHUB_OUTPUT
            echo "destroy=false" >> $GITHUB_OUTPUT
          else
            echo "env_name=${{ github.event.inputs.env_name }}" >> $GITHUB_OUTPUT
            echo "env_folder=${{ github.event.inputs.env_name }}-environment" >> $GITHUB_OUTPUT
            echo "image_url=${{ github.event.inputs.image_url }}" >> $GITHUB_OUTPUT
            echo "destroy=${{ github.event.inputs.destroy }}" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ steps.setvars.outputs.env_name }}/terraform.tfstate"
        working-directory: ${{ steps.setvars.outputs.env_folder }}

      - name: Terraform Format
        run: terraform fmt -check
        working-directory: ${{ steps.setvars.outputs.env_folder }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ steps.setvars.outputs.env_folder }}

      - name: Terraform Plan
        run: terraform plan -var-file="terraform.tfvars" -var="image_url=${{ steps.setvars.outputs.image_url }}"
        working-directory: ${{ steps.setvars.outputs.env_folder }}

      - name: Terraform Apply
        if: ${{ steps.setvars.outputs.destroy == 'false' }}
        run: terraform apply -auto-approve -var-file="terraform.tfvars" -var="image_url=${{ steps.setvars.outputs.image_url }}"
        working-directory: ${{ steps.setvars.outputs.env_folder }}

      - name: Terraform Destroy
        if: ${{ steps.setvars.outputs.destroy == 'true' }}
        run: terraform destroy -auto-approve -var-file="terraform.tfvars" -var="image_url=${{ steps.setvars.outputs.image_url }}"
        working-directory: ${{ steps.setvars.outputs.env_folder }}
